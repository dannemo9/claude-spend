<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monte Carlo — Claude MTD Spend</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#161923;--card:#1c202e;--border:#252a3a;--text:#e4e6f0;--muted:#6b7280;--accent:#d9724a;--green:#22c55e;--red:#ef4444}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;font-size:14px}
header{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.title{font-size:17px;font-weight:600}
.subtitle{font-size:12px;color:var(--muted);margin-top:2px}
.updated{font-size:12px;color:var(--muted)}
.wrap{padding:28px 32px;max-width:1200px;margin:0 auto}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.card-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.card-value{font-size:26px;font-weight:700}
.card-meta{font-size:12px;color:var(--muted);margin-top:5px}
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:18px}
.section-title{font-size:13px;font-weight:600;margin-bottom:16px}
.chart-wrap{position:relative;height:320px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--text)}
th.sorted{color:var(--accent)}
th:not(:first-child){text-align:right}
td{padding:10px 12px;border-bottom:1px solid #1a1e2b;white-space:nowrap}
td:not(:first-child){text-align:right}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#1a1e2b}
.rank{color:var(--muted);font-size:12px;width:28px;display:inline-block}
.bar{display:inline-block;height:6px;border-radius:3px;background:var(--accent);opacity:.7;margin-left:8px;vertical-align:middle}
.pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px}
.pill-hi{background:rgba(217,114,74,.15);color:#e89070}
.pill-md{background:rgba(107,159,212,.15);color:#8ab5d9}
.pill-lo{background:rgba(108,200,145,.12);color:#7fcca0}
.search-wrap{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
input[type=search]{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:7px 12px;color:var(--text);font-size:13px;width:220px;outline:none}
input[type=search]::placeholder{color:var(--muted)}
input[type=search]:focus{border-color:var(--accent)}
.count{font-size:12px;color:var(--muted)}
footer{text-align:center;padding:16px;color:var(--muted);font-size:11px;border-top:1px solid var(--border)}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-mark">&#129302;</div>
    <div>
      <div class="title">Claude MTD Spend &mdash; Monte Carlo</div>
      <div class="subtitle">claude.ai &middot; Organization usage</div>
    </div>
  </div>
  <div class="updated">Updated <span id="updatedAt"></span></div>
</header>

<div class="wrap">
  <div class="cards">
    <div class="card">
      <div class="card-label">Total MTD Spend</div>
      <div class="card-value" id="c-total"></div>
      <div class="card-meta" id="c-month"></div>
    </div>
    <div class="card">
      <div class="card-label">Active Users</div>
      <div class="card-value" id="c-users"></div>
      <div class="card-meta" id="c-zero"></div>
    </div>
    <div class="card">
      <div class="card-label">Top Spender</div>
      <div class="card-value" id="c-top" style="font-size:17px;padding-top:5px"></div>
      <div class="card-meta" id="c-top-amt"></div>
    </div>
    <div class="card">
      <div class="card-label">Avg per Active User</div>
      <div class="card-value" id="c-avg"></div>
      <div class="card-meta" id="c-median"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Top 15 spenders</div>
    <div class="chart-wrap"><canvas id="chartBar"></canvas></div>
  </div>

  <div class="section">
    <div class="search-wrap">
      <div class="section-title" style="margin:0">All members</div>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="count" id="tableCount"></span>
        <input type="search" id="searchBox" placeholder="Search name or email&hellip;" oninput="filterTable()">
      </div>
    </div>
    <table id="memberTable">
      <thead>
        <tr>
          <th onclick="sortTable(0)" data-col="0">#&nbsp;&nbsp;Name</th>
          <th onclick="sortTable(1)" data-col="1">Email</th>
          <th onclick="sortTable(2)" data-col="2" class="sorted">MTD Spend &#9662;</th>
          <th onclick="sortTable(3)" data-col="3">Share</th>
          <th onclick="sortTable(4)" data-col="4">Tier</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<footer>Claude.ai Organization admin data &middot; Monte Carlo Data &middot; No data leaves this page</footer>

// Table
let sortCol=2, sortDir=-1;
let filtered = sorted;

function tierPill(spend){
  if(spend>=3000) return '<span class="pill pill-hi">High</span>';
  if(spend>=500) return '<span class="pill pill-md">Mid</span>';
  return '<span class="pill pill-lo">Low</span>';
}

function renderTable(){
  const maxSpend = sorted[0]?.spend||1;
  document.getElementById('tableCount').textContent = filtered.length+' of '+all.length+' members';
  document.getElementById('tableBody').innerHTML = filtered.map((m,i)=>{
    const globalRank = sorted.indexOf(m)+1;
    const barW = Math.round(m.spend/maxSpend*80);
    return `<tr>
      <td><span class="rank">${globalRank}</span>${m.name}<span class="bar" style="width:${barW}px"></span></td>
      <td style="color:var(--muted)">${m.email}</td>
      <td><strong>${fmt(m.spend)}</strong></td>
      <td style="color:var(--muted)">${(m.spend/total*100).toFixed(2)}%</td>
      <td>${tierPill(m.spend)}</td>
    </tr>`;
  }).join('');
}

  });
  filtered.sort((a,b)=>{
    const vals=[a.name,a.email,a.spend,a.spend/total,a.spend];
    const valb=[b.name,b.email,b.spend,b.spend/total,b.spend];
    return typeof vals[col]==='string' ? vals[col].localeCompare(valb[col])*sortDir : (vals[col]-valb[col])*sortDir;
  });
  renderTable();
}

function filterTable(){
  const q = document.getElementById('searchBox').value.toLowerCase();
  filtered = q ? sorted.filter(m=>m.name.toLowerCase().includes(q)||m.email.toLowerCase().includes(q)) : [...sorted];
  renderTable();
}

filtered = [...sorted];
renderTable();
</script>
